name: Update RSS

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '**/*.ts'
  schedule:
    - cron: '0 * * * *'

jobs:
  update-rss:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v6

      - name: 🏗 Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install apt dependencies
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 10
          command: |
            sudo apt-get update
            grep -vE '^\s*#|^\s*$' .github/apt-packages.txt | xargs sudo apt-get install -y
            fc-cache -fv

      - name: Install nodejs dependencies
        run: yarn

      - name: Restore Twitter cookies cache
        uses: actions/cache@v5
        with:
          path: data/twitter-cookies.json
          key: twitter-cookies-v1-${{ github.repository }}

      - name: Check proxy connectivity (debug)
        run: |
          node -e "
          const initCycleTLS = require('cycletls').default;
          (async () => {
            const cycleTLS = await initCycleTLS();
            console.log('=== Without proxy ===');
            try {
              const r1 = await cycleTLS('https://httpbin.org/ip', {
                ja3: '771,4865-4866-4867-49195-49199-49196-49200-52393-52392-49171-49172-156-157-47-53,0-23-65281-10-11-35-16-5-13-18-51-45-43-27-17513,29-23-24,0',
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36',
              }, 'get');
              console.log('Direct IP:', r1.data);
            } catch(e) { console.error('Direct failed:', e.message); }

            console.log('=== With proxy ===');
            try {
              const proxyServer = process.env.PROXY_SERVER;
              const proxyUser = process.env.PROXY_USERNAME;
              const proxyPass = process.env.PROXY_PASSWORD;
              const proxyUrl = (proxyServer.startsWith('http') ? proxyServer : 'http://' + proxyServer);
              const u = new URL(proxyUrl);
              if (proxyUser) { u.username = proxyUser; u.password = proxyPass; }
              const proxy = u.toString();
              console.log('Proxy host:', u.host);
              const r2 = await cycleTLS('https://httpbin.org/ip', {
                proxy,
                ja3: '771,4865-4866-4867-49195-49199-49196-49200-52393-52392-49171-49172-156-157-47-53,0-23-65281-10-11-35-16-5-13-18-51-45-43-27-17513,29-23-24,0',
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36',
              }, 'get');
              console.log('Proxy IP:', r2.data);
            } catch(e) { console.error('Proxy failed:', e.message); }

            await cycleTLS.exit();
          })().catch(e => { console.error(e); process.exit(1); });
          "
        env:
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}

      - name: Update RSS
        id: update-rss
        run: |
          rm /tmp/.X*-lock || true
          rm -rf data/userdata/Singleton* || true
          Xvfb :99 -ac -screen 0 600x1000x16 -listen tcp &
          export DISPLAY=:99
          yarn build
          kill -9 "$(pgrep -f "Xvfb" | awk '{print $2}')" || true
        env:
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          TWITTER_PASSWORD: ${{ secrets.TWITTER_PASSWORD }}
          TWITTER_AUTH_CODE_SECRET: ${{ secrets.TWITTER_AUTH_CODE_SECRET }}
          TWITTER_EMAIL_ADDRESS: ${{ secrets.TWITTER_EMAIL_ADDRESS }}
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}

      - name: Error handling
        if: failure() && github.event_name != 'pull_request'
        uses: Ilshidur/action-discord@0.4.0
        with:
          args: ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_EMBEDS: |
            [
              {
                "title": "RSS Update Failed",
                "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "color": 16711680,
                "footer": {
                  "text": "${{ github.repository }}"
                }
              }
            ]

      - name: Upload Pages-artifact
        uses: actions/upload-pages-artifact@v4
        if: always()
        with:
          path: output

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: update-rss
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
