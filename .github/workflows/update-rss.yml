name: Update RSS

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '**/*.ts'
  schedule:
    - cron: '0 * * * *'

jobs:
  update-rss:
    runs-on: self-hosted

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v6

      - name: 🏗 Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Enable corepack (yarn)
        run: corepack enable

      - name: Install apt dependencies
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 10
          command: |
            sudo apt-get update
            grep -vE '^\s*#|^\s*$' .github/apt-packages.txt | xargs sudo apt-get install -y
            fc-cache -fv

      - name: Install nodejs dependencies
        run: yarn

      - name: Restore Twitter cookies cache
        uses: actions/cache@v5
        with:
          path: data/twitter-cookies.json
          key: twitter-cookies-v2-${{ github.repository }}-${{ github.run_id }}
          restore-keys: |
            twitter-cookies-v2-${{ github.repository }}-

      - name: Bootstrap cookies from secret (if no cache)
        run: |
          if [ ! -f data/twitter-cookies.json ] && [ -n "$TWITTER_COOKIES_JSON" ]; then
            mkdir -p data
            # savedAt を現在時刻に更新してファイルに書き込む
            echo "$TWITTER_COOKIES_JSON" | node -e "
              const chunks = [];
              process.stdin.on('data', c => chunks.push(c));
              process.stdin.on('end', () => {
                const d = JSON.parse(chunks.join(''));
                d.savedAt = Date.now();
                process.stdout.write(JSON.stringify(d, null, 2));
              });
            " > data/twitter-cookies.json
            echo "Cookies bootstrapped from secret (savedAt updated)"
          elif [ -f data/twitter-cookies.json ]; then
            echo "Cookies restored from cache"
          else
            echo "No cookies available (will attempt fresh login)"
          fi
        env:
          TWITTER_COOKIES_JSON: ${{ secrets.TWITTER_COOKIES_JSON }}

      - name: Update RSS
        id: update-rss
        run: |
          rm /tmp/.X*-lock || true
          rm -rf data/userdata/Singleton* || true
          Xvfb :99 -ac -screen 0 600x1000x16 -listen tcp &
          export DISPLAY=:99
          yarn build
          kill -9 "$(pgrep -f "Xvfb" | awk '{print $2}')" || true
        env:
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          TWITTER_PASSWORD: ${{ secrets.TWITTER_PASSWORD }}
          TWITTER_AUTH_CODE_SECRET: ${{ secrets.TWITTER_AUTH_CODE_SECRET }}
          TWITTER_EMAIL_ADDRESS: ${{ secrets.TWITTER_EMAIL_ADDRESS }}
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}

      - name: Error handling
        if: failure() && github.event_name != 'pull_request'
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"RSS Update Failed\",\"url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\",\"color\":16711680,\"footer\":{\"text\":\"${GITHUB_REPOSITORY}\"}}]}"
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Upload Pages-artifact
        uses: actions/upload-pages-artifact@v4
        if: always()
        with:
          path: output

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: update-rss
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
